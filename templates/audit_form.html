<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Audit — Scrapper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #f0ece3;
      --bg-warm:     #e8e2d6;
      --ink:         #1a1a14;
      --ink-mid:     #3a3a2e;
      --ink-muted:   #7a7a68;
      --ink-faint:   #aeae98;
      --forest:      #1c2e1c;
      --canopy:      #2a4430;
      --pine:        #3a5c3a;
      --moss:        #4e7450;
      --sage:        #6b9060;
      --sage-light:  #90b882;
      --pale-sage:   #c8dcc0;
      --mint-wash:   #e4efe0;
      --umber:       #4a3020;
      --brown-mid:   #6e5038;
      --tan:         #9a7a58;
      --parchment-lt:#ede0c8;
      --border:      rgba(26,26,20,0.1);
      --border-mid:  rgba(26,26,20,0.15);
      --red:         #904040;
      --amber:       #8a6030;
      --display:     'Playfair Display', Georgia, serif;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      cursor: none;
    }

    #cursor { position:fixed; pointer-events:none; z-index:9999; width:6px; height:6px; background:var(--ink); border-radius:50%; transform:translate(-50%,-50%); transition:width 0.18s,height 0.18s; }
    #cursor.big { width:36px; height:36px; background:transparent; border:1px solid rgba(26,26,20,0.3); }
    #cursor-ring { position:fixed; pointer-events:none; z-index:9998; width:28px; height:28px; border:1px solid rgba(26,26,20,0.12); border-radius:50%; transform:translate(-50%,-50%); }

    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      padding: 0 4%; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(240,236,227,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: var(--display); font-size: 1.3rem; font-weight: 700; color: var(--ink); text-decoration: none; }
    .nav-actions { display: flex; align-items: center; gap: 1rem; }
    .nav-btn {
      font-size: 0.72rem; color: var(--ink-muted);
      text-decoration: none; letter-spacing: 0.04em;
      transition: color 0.2s; cursor: none;
      background: none; border: none; font-family: 'Inter', sans-serif;
    }
    .nav-btn:hover { color: var(--ink); }
    .nav-btn.primary {
      color: var(--bg); background: var(--forest);
      padding: 0.42rem 1.1rem; border-radius: 2px;
      font-weight: 500;
    }
    .nav-btn.primary:hover { background: var(--canopy); }

    /* Report header */
    .report-header {
      background: var(--forest); color: #fff;
      padding: 5rem 4% 3rem;
    }
    .report-eyebrow {
      font-size: 0.62rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      display: flex; align-items: center; gap: 0.7rem;
      margin-bottom: 1.2rem;
    }
    .report-eyebrow::before { content:''; width:16px; height:1px; background:currentColor; }
    .report-header h1 {
      font-family: var(--display);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 800; line-height: 1.1;
      letter-spacing: -0.02em; color: #fff;
      margin-bottom: 0.5rem;
    }
    .report-header h1 em { font-style: italic; color: var(--sage-light); }
    .report-meta {
      font-size: 0.65rem; color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* Main content */
    .report-body { max-width: 860px; margin: 0 auto; padding: 3rem 4% 5rem; }

    /* ── STYLES FOR CLAUDE'S HTML OUTPUT ── */
    .audit-report {}

    .audit-section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2rem;
      margin-bottom: 1.2rem;
      box-shadow: 0 2px 12px rgba(26,26,20,0.04);
    }

    .audit-section h2 {
      font-family: var(--display);
      font-size: 1.25rem; font-weight: 700;
      color: var(--ink); margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.01em;
    }

    /* Summary section */
    .summary-section { border-top: 3px solid var(--moss); }
    .summary-intro {
      font-size: 0.92rem; color: var(--ink-mid);
      line-height: 1.75; margin-bottom: 1.2rem;
      font-weight: 400;
    }
    .metrics-row {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 0.8rem;
    }
    .metric-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px; padding: 1rem;
      text-align: center;
    }
    .metric-label {
      font-size: 0.58rem; color: var(--ink-muted);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 0.4rem; font-weight: 500;
    }
    .metric-value {
      font-family: var(--display);
      font-size: 1.6rem; font-weight: 700;
      color: var(--ink); letter-spacing: -0.02em;
    }
    .metric-value.green { color: var(--moss); }
    .metric-value.amber { color: var(--brown-mid); }
    .metric-value.red   { color: var(--red); }

    /* Findings */
    .findings-section { border-top: 3px solid var(--red); }
    .finding-card {
      border-left: 2px solid;
      padding: 1rem 1.2rem;
      margin-bottom: 0.7rem;
      border-radius: 0 2px 2px 0;
    }
    .finding-card.red   { border-color: var(--red);   background: rgba(144,64,64,0.05); }
    .finding-card.amber { border-color: var(--amber); background: rgba(138,96,48,0.05); }
    .finding-card.green { border-color: var(--moss);  background: rgba(78,116,80,0.05); }
    .finding-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 1rem;
      margin-bottom: 0.6rem; flex-wrap: wrap;
    }
    .finding-title { font-size: 0.88rem; font-weight: 500; color: var(--ink); }
    .finding-amount {
      font-size: 0.85rem; font-weight: 600;
      color: var(--red); white-space: nowrap; flex-shrink: 0;
    }
    .finding-card.green .finding-amount { color: var(--moss); }
    .finding-card.amber .finding-amount { color: var(--brown-mid); }
    .finding-body {
      font-size: 0.8rem; color: var(--ink-muted);
      line-height: 1.7;
    }
    .finding-body strong { color: var(--ink-mid); font-weight: 500; }

    /* Lists */
    .savings-list, .diversion-list, .contract-list, .action-list {
      padding-left: 1.1rem; margin: 0;
    }
    .savings-list li, .diversion-list li, .contract-list li, .action-list li {
      font-size: 0.82rem; color: var(--ink-mid);
      line-height: 1.75; margin-bottom: 0.8rem;
      padding-left: 0.3rem;
    }
    .action-impact {
      font-size: 0.75rem; color: var(--moss);
      font-weight: 500;
    }
    .action-intro { font-size: 0.78rem; color: var(--ink-muted); margin-bottom: 0.8rem; }
    .action-plan { border-top: 3px solid var(--brown-mid); }

    .audit-section p {
      font-size: 0.84rem; color: var(--ink-mid);
      line-height: 1.8; margin-bottom: 0.8rem;
    }
    .audit-section ul, .audit-section ol {
      padding-left: 1.2rem; margin-bottom: 0.8rem;
    }
    .audit-section li {
      font-size: 0.82rem; color: var(--ink-mid);
      line-height: 1.7; margin-bottom: 0.4rem;
    }
    .audit-section strong { color: var(--ink); font-weight: 500; }
    .green { color: var(--moss); }
    .red   { color: var(--red); }

    /* Bottom actions */
    .bottom-actions {
      display: flex; gap: 0.8rem; justify-content: flex-start;
      margin-top: 2rem; flex-wrap: wrap;
      padding-top: 2rem; border-top: 1px solid var(--border);
    }
    .action-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.6rem; border-radius: 2px;
      font-size: 0.78rem; font-weight: 500;
      text-decoration: none; border: none; cursor: none;
      transition: all 0.22s; font-family: 'Inter', sans-serif;
      letter-spacing: 0.03em;
    }
    .action-btn.primary { background: var(--forest); color: var(--bg); }
    .action-btn.primary:hover { background: var(--canopy); transform: translateY(-1px); }
    .action-btn.secondary { background: #fff; color: var(--ink); border: 1px solid var(--border-mid); }
    .action-btn.secondary:hover { border-color: var(--moss); color: var(--pine); }

    @media print {
      nav, .bottom-actions { display: none; }
      .report-body { padding-top: 1rem; }
      .audit-section { box-shadow: none; break-inside: avoid; }
    }
    @media(max-width:640px) {
      .metrics-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav>
  <a href="/" class="nav-logo">Scrapper</a>
  <div class="nav-actions">
    <button class="nav-btn" onclick="window.print()">Print Report</button>
    <a href="/audit" class="nav-btn primary">+ New Audit</a>
  </div>
</nav>

<div class="report-header">
  <div class="report-eyebrow">Audit Report</div>
  <h1><em>{{ business_name }}</em></h1>
  <div class="report-meta">Generated by Scrapper · Powered by Claude Opus 4.6</div>
</div>

<div class="report-body">
  {{ audit_html | safe }}

  <div class="bottom-actions">
    <button class="action-btn primary" onclick="window.print()">Print / Save PDF</button>
    <a href="/audit" class="action-btn secondary">New Audit</a>
    <a href="/" class="action-btn secondary">← Home</a>
  </div>
</div>

<script>
  const cursor=document.getElementById('cursor');
  const ring=document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
  (function tick(){rx+=(mx-rx)*0.09;ry+=(my-ry)*0.09;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tick);})();
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>cursor.classList.add('big'));
    el.addEventListener('mouseleave',()=>cursor.classList.remove('big'));
  });
</script>
</body>
</html>
